<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .breadcrumb {
            color: #666;
            font-size: 14px;
        }
        .breadcrumb a {
            color: #667eea;
            text-decoration: none;
        }
        .breadcrumb a:hover {
            text-decoration: underline;
        }
        .download-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
        }
        .download-btn:hover {
            background: #5568d3;
        }
        .content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            min-height: 600px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 15px;
            border-radius: 5px;
        }
        iframe {
            width: 100%;
            min-height: 800px;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="breadcrumb">
                <a href="/">Home</a> / <span id="report-path">{{ report_path }}</span>
            </div>
            <button class="download-btn" onclick="downloadReport()">Download</button>
        </div>

        <div class="content" id="content-container">
            <div class="loading">Loading report...</div>
        </div>
    </div>

    <script>
        const reportPath = "{{ report_path }}";

        async function loadReport() {
            const container = document.getElementById('content-container');

            try {
                const response = await fetch(`/api/report/${reportPath}`);
                if (!response.ok) throw new Error('Failed to fetch report');

                const contentType = response.headers.get('content-type');

                if (contentType.includes('text/html')) {
                    const html = await response.text();
                    container.innerHTML = `<iframe srcdoc="${html.replace(/"/g, '&quot;')}"></iframe>`;
                } else if (contentType.includes('application/json')) {
                    const json = await response.json();
                    container.innerHTML = `<pre>${JSON.stringify(json, null, 2)}</pre>`;
                } else {
                    const text = await response.text();
                    container.innerHTML = `<pre>${text}</pre>`;
                }

            } catch (error) {
                container.innerHTML = `<div class="error">Error loading report: ${error.message}</div>`;
            }
        }

        async function downloadReport() {
            try {
                const response = await fetch(`/api/report/${reportPath}/download`);
                const data = await response.json();
                window.open(data.download_url, '_blank');
            } catch (error) {
                alert('Error generating download link: ' + error.message);
            }
        }

        loadReport();
    </script>
</body>
</html>
