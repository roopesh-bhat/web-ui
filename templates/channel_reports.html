<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ channel }} - Reports</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        .breadcrumb {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .breadcrumb a {
            color: #667eea;
            text-decoration: none;
        }
        .breadcrumb a:hover {
            text-decoration: underline;
        }
        h1 {
            color: #333;
        }
        .reports {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .reports-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .filter-bar input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .report-table {
            width: 100%;
            border-collapse: collapse;
        }
        .report-table th {
            background: #f5f5f5;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #ddd;
        }
        .report-table td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        .report-table tr:hover {
            background: #f9f9f9;
        }
        .report-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .report-link:hover {
            text-decoration: underline;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
        }
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .refresh-btn:hover {
            background: #5568d3;
        }
        .file-size {
            color: #666;
            font-size: 13px;
        }
        .pagination-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 5px;
            border: 1px solid #e0e0e0;
        }
        .pagination-info {
            color: #666;
            font-size: 14px;
        }
        .pagination-buttons {
            display: flex;
            gap: 10px;
        }
        .sort-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
        }
        .sort-controls label {
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="breadcrumb">
                <a href="/">Home</a> / {{ channel }}
            </div>
            <h1>{{ channel }} Reports</h1>
        </div>

        <div class="reports">
            <div class="reports-header">
                <h2>Reports</h2>
                <button class="refresh-btn" onclick="resetAndLoadReports()">Refresh</button>
            </div>

            <div class="filter-bar">
                <input type="date" id="date-filter" placeholder="Filter by date">
                <button class="refresh-btn" onclick="resetAndLoadReports()">Filter</button>
            </div>

            <div class="sort-controls">
                <label>
                    <input type="checkbox" id="latest-first" checked onchange="resetAndLoadReports()">
                    Show Latest First
                </label>
            </div>

            <div id="reports-container">
                <div class="loading">Loading reports...</div>
            </div>

            <div id="pagination-controls"></div>
        </div>
    </div>

    <script>
        const channel = "{{ channel }}";
        let currentToken = null;
        let previousTokens = [];

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        function formatDate(dateString) {
            return new Date(dateString).toLocaleString();
        }

        async function loadReports(continuationToken = null, isPrevious = false) {
            const container = document.getElementById('reports-container');
            const paginationContainer = document.getElementById('pagination-controls');
            container.innerHTML = '<div class="loading">Loading reports...</div>';
            paginationContainer.innerHTML = '';

            try {
                const dateFilter = document.getElementById('date-filter').value;
                const latestFirst = document.getElementById('latest-first').checked;

                let url = `/api/reports?channel=${encodeURIComponent(channel)}&limit=100`;
                if (dateFilter) {
                    url += `&date=${dateFilter}`;
                }
                if (continuationToken) {
                    url += `&continuation_token=${encodeURIComponent(continuationToken)}`;
                }

                const response = await fetch(url);
                if (!response.ok) throw new Error('Failed to fetch reports');

                const data = await response.json();
                let reports = data.reports;

                if (reports.length === 0) {
                    container.innerHTML = '<div class="loading">No reports found</div>';
                    return;
                }

                // Sort by latest if checked (API already sorts, but this ensures it)
                if (latestFirst) {
                    reports.sort((a, b) => new Date(b.last_modified) - new Date(a.last_modified));
                }

                // Update pagination state
                if (!isPrevious && currentToken && continuationToken !== currentToken) {
                    previousTokens.push(currentToken);
                }
                currentToken = data.next_token;

                // Calculate page info
                const pageNumber = previousTokens.length + 1;
                const estimatedTotal = data.has_more ? `${pageNumber * 100}+` : `${(pageNumber - 1) * 100 + reports.length}`;

                // Render table
                container.innerHTML = `
                    <table class="report-table">
                        <thead>
                            <tr>
                                <th>Filename</th>
                                <th>Date</th>
                                <th>Size</th>
                                <th>Last Modified</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${reports.map(report => `
                                <tr>
                                    <td>
                                        <a href="/api/report/${report.key}" class="report-link" target="_blank">
                                            ${report.filename}
                                        </a>
                                    </td>
                                    <td>${report.date}</td>
                                    <td class="file-size">${formatFileSize(report.size)}</td>
                                    <td>${formatDate(report.last_modified)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;

                // Render pagination controls separately
                paginationContainer.innerHTML = `
                    <div class="pagination-controls">
                        <div class="pagination-info">
                            Showing ${(pageNumber - 1) * 100 + 1}-${(pageNumber - 1) * 100 + reports.length} of ~${estimatedTotal} reports
                        </div>
                        <div class="pagination-buttons">
                            ${previousTokens.length > 0 ? `
                                <button class="refresh-btn" onclick="loadPreviousPage()">← Previous Page</button>
                            ` : ''}
                            ${data.has_more ? `
                                <button class="refresh-btn" onclick="loadNextPage()">Next Page →</button>
                            ` : ''}
                        </div>
                    </div>
                `;

            } catch (error) {
                container.innerHTML = `<div class="error">Error loading reports: ${error.message}</div>`;
            }
        }

        function loadNextPage() {
            if (currentToken) {
                loadReports(currentToken, false);
            }
        }

        function loadPreviousPage() {
            if (previousTokens.length > 0) {
                const prevToken = previousTokens.pop();
                currentToken = prevToken;
                loadReports(prevToken, true);
            }
        }

        function resetAndLoadReports() {
            currentToken = null;
            previousTokens = [];
            loadReports();
        }

        loadReports();
    </script>
</body>
</html>
